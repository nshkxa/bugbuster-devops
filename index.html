<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BugBuster 3000</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #121212;
  color: white;
  text-align: center;
  padding: 40px;
  transition: 0.3s;
}

.light-mode {
  background: #f4f4f4;
  color: #222;
}

h1 {
  font-size: 42px;
}

input {
  padding: 10px;
  font-size: 16px;
  border-radius: 6px;
  border: none;
}

button {
  padding: 10px 20px;
  font-size: 16px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
  margin: 5px;
}

.primary {
  background: #ff4b5c;
  color: white;
}

.secondary {
  background: #444;
  color: white;
}

#result {
  margin-top: 25px;
  font-size: 20px;
}

#terminal {
  margin-top: 30px;
  background: black;
  padding: 20px;
  border-radius: 8px;
  font-family: monospace;
  text-align: left;
  height: 150px;
  overflow-y: auto;
}
</style>
</head>

<body>

<h1>BugBuster 3000</h1>
<p>Enter number of bugs in your code:</p>

<input type="number" id="bugCount" placeholder="e.g. 5">
<button class="primary" onclick="fixBugs()">Fix Bugs</button>
<button class="secondary" onclick="resetApp()">Reset</button>
<button class="secondary" onclick="toggleMode()">Toggle Mode</button>

<div id="result"></div>

<div id="terminal">
> System Ready... <br>
</div>

<script>
function logTerminal(message) {
  const terminal = document.getElementById("terminal");
  terminal.innerHTML += "> " + message + "<br>";
  terminal.scrollTop = terminal.scrollHeight;
}

function fixBugs() {
  const bugs = document.getElementById("bugCount").value;
  const result = document.getElementById("result");

  if (bugs === "" || bugs < 0) {
    result.innerHTML = "Please enter a valid number.";
    return;
  }

  result.innerHTML = "Deploying fix to production...";
  logTerminal("Scanning codebase...");
  
  setTimeout(() => {
    logTerminal("Removing " + bugs + " bugs...");
  }, 1000);

  setTimeout(() => {
    logTerminal("Deployment successful.");
    result.innerHTML = "Successfully fixed " + bugs + " bugs. But 2 new ones appeared.";
  }, 2500);
}

function resetApp() {
  document.getElementById("bugCount").value = "";
  document.getElementById("result").innerHTML = "";
  document.getElementById("terminal").innerHTML = "> System Reset...<br>";
}

function toggleMode() {
  document.body.classList.toggle("light-mode");
}
</script>

</body>
</html>
