name: BugBuster CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Simulate Build
        run: echo "Building BugBuster 3000..."

      - name: Simulate Test
        run: echo "Testing complete. Bugs may still exist."
      - name: Notify Slack
        if: always()
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data '{"text":"BugBuster build completed successfully 🚀"}' \
          ${{ secrets.SLACK_WEBHOOK }}
